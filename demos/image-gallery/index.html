<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Filter Demo</title>
    <link rel="stylesheet" href="../demo-styles.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="demo-wrapper">
        
        <a href="../" class="back-btn">&larr; View All</a>

        <div class="gallery-container">
            <div class="gallery-grid-item"><img src="images/gallery-1.jpg" alt="Image 1"></div>
            <div class="gallery-grid-item"><img src="images/gallery-2.jpg" alt="Image 2"></div>
            <div class="gallery-grid-item"><img src="images/gallery-3.jpg" alt="Image 3"></div>
            <div class="gallery-grid-item"><img src="images/gallery-4.jpg" alt="Image 4"></div>
            <div class="gallery-grid-item"><img src="images/gallery-5.jpg" alt="Image 5"></div>
            <div class="gallery-grid-item"><img src="images/gallery-6.jpg" alt="Image 6"></div>
            <div class="gallery-grid-item"><img src="images/gallery-7.jpg" alt="Image 7"></div>
            <div class="gallery-grid-item"><img src="images/gallery-8.jpg" alt="Image 8"></div>
            <div class="gallery-grid-item"><img src="images/gallery-9.jpg" alt="Image 9"></div>
            <div class="gallery-grid-item"><img src="images/gallery-10.jpg" alt="Image 10"></div>
            <div class="gallery-grid-item"><img src="images/gallery-11.jpg" alt="Image 11"></div>
            <div class="gallery-grid-item"><img src="images/gallery-12.jpg" alt="Image 12"></div>
            <div class="gallery-grid-item"><img src="images/gallery-13.jpg" alt="Image 13"></div>
            <div class="gallery-grid-item"><img src="images/gallery-14.jpg" alt="Image 14"></div>

            <div class="gallery-grid-item"><img src="images/gallery-16.jpg" alt="Image 16"></div>
            <div class="gallery-grid-item"><img src="images/gallery-17.jpg" alt="Image 17"></div>
            <div class="gallery-grid-item"><img src="images/gallery-18.jpg" alt="Image 18"></div>
            <div class="gallery-grid-item"><img src="images/gallery-19.jpg" alt="Image 19"></div>
            <div class="gallery-grid-item"><img src="images/gallery-20.jpg" alt="Image 20"></div>
        </div>

        <div class="gallery-carousel-overlay">
            <div class="gallery-carousel-rel">
                <div class="gallery-carousel">
                    <img id="gallery-carousel-image" src="" alt="Carousel Image">
                </div>
                <div id="gallery-prev-btn"></div>
                <div id="gallery-next-btn"></div>
                <span id="gallery-image-counter">1/20</span>
                <div id="gallery-close-btn">
                    <div class="gallery-close-1"></div>
                    <div class="gallery-close-2"></div>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

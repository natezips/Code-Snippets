<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snippet Demos</title>
    <link rel="stylesheet" href="demo-styles.css" />

    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e5e7eb;
            transition: all 0.15s ease;
        }

            .card:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            }

        .card-title {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 14px;
            color: #6b7280;
        }

        .empty {
            color: #6b7280;
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Code Snippet Demos</h1>
        <div class="subtitle">
            Interactive previews of reusable components.
        </div>

        <div id="demoGrid" class="grid"></div>
        <div id="emptyState" class="empty" style="display:none;">
            No demos found.
        </div>
    </div>

    <script>
    async function loadDemos() {
      try {
        const res = await fetch("./demos.json");
        const demos = await res.json();

        const grid = document.getElementById("demoGrid");
        const empty = document.getElementById("emptyState");

        if (!demos.length) {
          empty.style.display = "block";
          return;
        }

        demos.forEach(demo => {
          const a = document.createElement("a");
          a.className = "card";
          a.href = demo.path;

          a.innerHTML = `
            <div class="card-title">${demo.title}</div>
            <div class="card-desc">${demo.description}</div>
          `;

          grid.appendChild(a);
        });

      } catch (err) {
        console.error("Failed to load demos:", err);
      }
    }

    loadDemos();
    </script>

</body>
</html>
